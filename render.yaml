services:
  - type: web
    name: pce-exam-api
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn backend.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: pce-exam-db
          property: connectionString
      - key: PYTHON_VERSION
        value: 3.11.0

databases:
  - name: pce-exam-db
    plan: free
